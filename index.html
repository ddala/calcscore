<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCR2 Score Calculator</title>
    <link rel="icon" type="image/png" href="icclogo.png">
    <link rel="apple-touch-icon" href="icclogo.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root, [data-bs-theme="dark"] {
            --bs-body-bg: #0a0a0c;
            --bs-body-color: #c8c8d0;
            --bs-tertiary-bg: #111115;
            --bs-secondary-bg: #111115;
            --bs-border-color: #1e1e24;
            --bs-emphasis-color: #e8e8ec;
            --bs-primary: #60a5fa;
            --bs-primary-rgb: 96, 165, 250;
            --bs-secondary: #5a5a66;
            --bs-secondary-rgb: 90, 90, 102;
        }

        body {
            background-color: #0a0a0c;
        }

        .navbar {
            background-color: #111115 !important;
            border-bottom: 1px solid #1e1e24;
        }

        .form-control, .form-select {
            background-color: #111115;
            border-color: #1e1e24;
            color: #c8c8d0;
        }

        .form-control:focus, .form-select:focus {
            background-color: #16161b;
            border-color: #60a5fa;
            color: #c8c8d0;
            box-shadow: 0 0 0 0.2rem rgba(96, 165, 250, 0.15);
        }

        .form-label, .col-form-label {
            color: #c8c8d0;
        }

        .form-check-label {
            color: #c8c8d0;
        }

        .btn-primary {
            background-color: #60a5fa;
            border-color: #60a5fa;
            color: #0a0a0c;
        }

        .btn-primary:hover {
            background-color: #7db8fb;
            border-color: #7db8fb;
            color: #0a0a0c;
        }

        .btn-secondary {
            background-color: #1e1e24;
            border-color: #2a2a32;
            color: #c8c8d0;
        }

        .btn-secondary:hover {
            background-color: #2a2a32;
            border-color: #36363e;
            color: #e8e8ec;
        }

        .btn-outline-light {
            border-color: #1e1e24;
            color: #c8c8d0;
        }

        .btn-outline-light:hover {
            background-color: #1e1e24;
            border-color: #2a2a32;
            color: #e8e8ec;
        }

        .modal-content {
            background-color: #111115;
            border-color: #1e1e24;
        }

        .modal-header {
            border-bottom-color: #1e1e24;
        }

        .modal-footer {
            border-top-color: #1e1e24;
        }

        .list-group-item {
            background-color: #111115;
            border-color: #1e1e24;
            color: #c8c8d0;
        }

        .alert-danger {
            background-color: #1a0a0a;
            border-color: #4a1a1a;
            color: #f87171;
        }

        .alert-success {
            background-color: #0a1a0a;
            border-color: #1a4a1a;
            color: #4ade80;
        }

        #errorAlert {
            transition: all 0.5s ease;
            transform: translateY(-100%);
            opacity: 0;
        }
        #errorAlert.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="errorAlert"
        class="alert alert-danger text-center position-fixed top-0 start-50 translate-middle-x w-75 shadow"
        role="alert" style="z-index:1050;">
    </div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center gap-2" href="#">
                <img src="icclogo.png" alt="ICC" height="35">
                <span>HCR2 Score Calculator</span>
            </a>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <button type="button" class="btn btn-secondary" data-bs-toggle="modal" data-bs-target="#settingsModal">
                        <i class="bi bi-gear-fill"></i>
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container mt-3">
        <div class="row">
            <div class="col-12 col-lg-8">
                <form id="teamCalculatorForm">
                    <div class="row mb-3">
                        <div class="col">
                            <label for="teamCountSelect" class="form-label">Select number of teams:</label>
                            <select class="form-select" id="teamCountSelect">
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                            </select>
                        </div>
                        <div class="col">
                            <label for="totalPlayerCountInput" class="form-label">Total number of players:</label>
                            <input type="text" class="form-control" id="totalPlayerCountInput" name="total" autocomplete="off" value="50" />
                        </div>
                    </div>

                    <div id="teamInputs"></div>

                    <button type="button" class="btn btn-primary" id="calculateScoresButton">Calculate scores</button>
                </form>

                <div id="result" class="mt-4 d-none">
                    <h3>Results</h3>
                    <div id="resultList" class="list-group mt-2"></div>
                </div>

                <button id="copyButton" class="btn btn-outline-light btn-sm mt-3 d-none">
                    <i class="bi bi-clipboard"></i> Copy results
                </button>
            </div>
        </div>
    </div>

    <div class="modal fade" id="settingsModal" tabindex="-1" aria-labelledby="settingsModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="settingsModalLabel">Settings</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="settingsForm">
                        <div class="mb-3">
                            <input class="form-check-input" type="checkbox" id="iccModeCheckbox" checked>
                            <label class="form-check-label" for="iccModeCheckbox">ICC Mode (1st spot gets 301 points)</label>
                        </div>
                        <div class="mb-3">
                            <input class="form-check-input" type="checkbox" id="sortScoresCheckbox">
                            <label class="form-check-label" for="sortScoresCheckbox">Sort scores (highest first)</label>
                        </div>
                        <div class="row mb-3">
                            <label for="team1NameInput" class="col-form-label col-sm-3">Team 1 name</label>
                            <div class="col-9">
                                <input type="text" class="form-control" id="team1NameInput">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <label for="team2NameInput" class="col-form-label col-sm-3">Team 2 name</label>
                            <div class="col-9">
                                <input type="text" class="form-control" id="team2NameInput">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <label for="team3NameInput" class="col-form-label col-sm-3">Team 3 name</label>
                            <div class="col-9">
                                <input type="text" class="form-control" id="team3NameInput">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <label for="team4NameInput" class="col-form-label col-sm-3">Team 4 name</label>
                            <div class="col-9">
                                <input type="text" class="form-control" id="team4NameInput">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" id="saveSettingsButton" data-bs-dismiss="modal">Save changes</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
    <script src="calc.js?v=8"></script>
</body>
</html>
